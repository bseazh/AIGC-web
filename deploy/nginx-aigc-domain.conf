map $http_x_request_id $aigc_request_id {
    default $http_x_request_id;
    "" $request_id;
}

log_format aigc_json escape=json '{"timestamp":"$time_iso8601","level":"info","service":"nginx","event":"http_request","requestId":"$aigc_request_id","method":"$request_method","path":"$uri","status":$status,"bytes":$body_bytes_sent,"durationSeconds":$request_time,"upstreamDurationSeconds":"$upstream_response_time","remoteIp":"$remote_addr","userAgent":"$http_user_agent"}';

server {
    listen 80;
    server_name aigc.bigapple.store;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name aigc.bigapple.store;

    ssl_certificate /etc/letsencrypt/live/aigc.bigapple.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aigc.bigapple.store/privkey.pem;

    client_max_body_size 10m;
    access_log /var/log/nginx/aigc-access.json aigc_json;
    error_log /var/log/nginx/aigc-error.log warn;

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-ID $aigc_request_id;
        add_header X-Request-ID $aigc_request_id always;
        proxy_read_timeout 120s;
    }
}
